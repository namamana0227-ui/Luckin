<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Luckin Stock Update</title><style>
:root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}*{box-sizing:border-box}body{margin:0;background:#f3c8ab;color:var(--deep);font-family:Arial,sans-serif}.bar{background:var(--orange);color:#fff;padding:18px max(22px,calc((100% - 680px)/2));font-size:19px;font-weight:800}.page{width:min(620px,calc(100% - 32px));margin:35px auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:24px}h1{font-size:26px;margin:0 0 7px}p{color:var(--muted);line-height:1.45}.notice{padding:11px 12px;background:#ffeadc;border-radius:7px;font-size:12px;color:#7d391d;margin:18px 0}.field{display:grid;gap:6px;margin-top:15px}label{font-weight:700;font-size:13px}input,select,textarea{border:1px solid #dba886;border-radius:7px;padding:11px;background:#fff;font:inherit;color:var(--deep)}textarea{min-height:70px;resize:vertical}button{width:100%;margin-top:22px;border:0;border-radius:7px;background:var(--orange);color:#fff;padding:12px;font-weight:800;font-size:14px;cursor:pointer}.hidden{display:none}.success{text-align:center;padding:25px}.success h2{margin:0 0 7px}
</style></head><body><header class="bar">LUCKIN · Stock Update</header><main class="page"><section class="card" id="formCard"><h1>Update Luckin stock</h1><p>Receive a coded box, or record where an available box is used.</p><div class="notice">Record each box by its unique box code, product name, and size.</div><form id="form"><div class="field"><label for="activity">Activity</label><select id="activity"><option value="Receive">Receive new box</option><option value="Use">Use box for branch</option></select></div><div id="receiveFields"><div class="field"><label for="code">Box code</label><input id="code" placeholder="Example: S02-12"></div><div class="field"><label for="product">Product name</label><select id="product" required><option value="">Select product</option><option>吊挂</option><option>侧标</option><option>非标</option><option>背光字</option><option>灯箱</option><option>Luckin Coffee立体站式</option><option>Photo Frame</option><option>字体 1(SILVER)</option><option>字体 2(SILVER)</option><option>字体 3(SILVER)</option><option>字体 4(SILVER)</option><option>字体 5(SILVER)</option><option>字体 6(SILVER)</option><option>字体 7(SILVER)</option><option>字体 8(SILVER)</option><option>字体 9(SILVER)</option><option>PICK UP(SILVER)</option><option>NO. MY (SILVER)</option><option>字体 1(COOPER)</option><option>字体 2(COOPER)</option><option>字体 3(COOPER)</option><option>字体 4(COOPER)</option><option>字体 5(COOPER)</option><option>字体 6(COOPER)</option><option>字体 7(COOPER)</option><option>字体 8(COOPER)</option><option>字体 9(COOPER)</option><option>PICK UP(COOPER)</option><option>NO. MY (COOPER)</option><option>蓝底白鹿-正面鹿头</option><option>双面火箱古铜色</option><option>fabric lightbox</option><option>横板背架-非标Luckin Coffee</option></select></div><div class="field"><label for="size">Size</label><input id="size" placeholder="Example: 600mm"></div></div><div id="useFields" class="hidden"><div class="field"><label for="availableBox">Available box code</label><select id="availableBox"></select></div><div class="field"><label for="branch">Used for Luckin branch</label><input id="branch" placeholder="Example: Luckin KLCC"></div></div><div class="field"><label for="notes">Notes</label><textarea id="notes" placeholder="Optional delivery or installation notes."></textarea></div><button id="submit">Save stock update</button></form></section><section class="card success hidden" id="success"><h2>✓ Stock updated</h2><p>The box record has been saved.</p><button onclick="location.reload()">Add another update</button></section></main><script>
let boxes=JSON.parse(localStorage.getItem('luckin-box-register')||'null')||[];const dateNow=()=>new Date().toLocaleString('en-MY');const activity=document.getElementById('activity');function updateForm(){const receive=activity.value==='Receive';document.getElementById('receiveFields').classList.toggle('hidden',!receive);document.getElementById('useFields').classList.toggle('hidden',receive);if(!receive)renderAvailable()}function renderAvailable(){const select=document.getElementById('availableBox');const available=boxes.filter(box=>box.status==='Available');select.innerHTML=available.length?available.map(box=>`<option value="${box.id}">${box.code} — ${box.product}${box.size?' · '+box.size:''}</option>`).join(''):'<option value="">No available boxes</option>'}function fillBoxDetails(){}document.getElementById('form').onsubmit=event=>{event.preventDefault();if(activity.value==='Receive'){const code=document.getElementById('code').value.trim(),product=document.getElementById('product').value.trim(),size=document.getElementById('size').value.trim();if(!code||!product||!size){alert('Enter Box Code, Product Name, and Size.');return}if(boxes.some(box=>box.code.toLowerCase()===code.toLowerCase())){alert('This box code already exists.');return}boxes.push({id:Date.now(),code,product,size,receivedAt:dateNow(),status:'Available',branch:'',usedAt:'',notes:document.getElementById('notes').value.trim()})}else{const id=Number(document.getElementById('availableBox').value),branch=document.getElementById('branch').value.trim();if(!id||!branch){alert('Choose an available box and enter the branch name.');return}boxes=boxes.map(box=>box.id===id?{...box,status:'Used',branch,usedAt:dateNow(),notes:document.getElementById('notes').value.trim()||box.notes}:box)}localStorage.setItem('luckin-box-register',JSON.stringify(boxes));document.getElementById('formCard').classList.add('hidden');document.getElementById('success').classList.remove('hidden')};updateForm();
</script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const stockDatabase=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
const stockRow=row=>({id:row.id,code:row.box_code,product:row.product_name,size:row.size,receivedAt:new Date(row.received_at).toLocaleString('en-MY'),status:row.status,branch:row.branch||'',usedAt:row.used_at?new Date(row.used_at).toLocaleString('en-MY'):'',notes:row.notes||''});
async function loadSharedStock(){const {data,error}=await stockDatabase.from('luckin_boxes').select('*').order('received_at');if(error){alert('Cannot load Luckin stock: '+error.message);return}boxes=data.map(stockRow);updateForm()}
document.getElementById('form').onsubmit=async event=>{event.preventDefault();const button=document.getElementById('submit');button.disabled=true;button.textContent='Saving...';let error;if(activity.value==='Receive'){const code=document.getElementById('code').value.trim(),product=document.getElementById('product').value.trim(),size=document.getElementById('size').value.trim();if(!code||!product||!size){alert('Enter Box Code, Product Name, and Size.');button.disabled=false;button.textContent='Save stock update';return}({error}=await stockDatabase.from('luckin_boxes').insert({box_code:code,product_name:product,size,notes:document.getElementById('notes').value.trim()}))}else{const id=Number(document.getElementById('availableBox').value),branch=document.getElementById('branch').value.trim();if(!id||!branch){alert('Choose an available box and enter the branch name.');button.disabled=false;button.textContent='Save stock update';return}({error}=await stockDatabase.from('luckin_boxes').update({status:'Used',branch,used_at:new Date().toISOString(),notes:document.getElementById('notes').value.trim()}).eq('id',id))}if(error){alert(error.message);button.disabled=false;button.textContent='Save stock update';return}document.getElementById('formCard').classList.add('hidden');document.getElementById('success').classList.remove('hidden')};
loadSharedStock();
</script></body></html>
