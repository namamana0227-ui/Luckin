<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Luckin Stock Update</title>
  <style>
    :root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}
    *{box-sizing:border-box}body{margin:0;background:#f3c8ab;color:var(--deep);font-family:Arial,sans-serif}
    .bar{background:var(--orange);color:#fff;padding:18px max(22px,calc((100% - 720px)/2));font-size:19px;font-weight:800}
    .page{width:min(680px,calc(100% - 28px));margin:28px auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:24px}
    h1{font-size:26px;margin:0 0 7px}p{color:var(--muted);line-height:1.45}.notice{padding:11px 12px;background:#ffeadc;border-radius:7px;font-size:12px;color:#7d391d;margin:18px 0}
    .field{display:grid;gap:6px;margin-top:15px}label{font-weight:700;font-size:13px}input,select,textarea{width:100%;border:1px solid #dba886;border-radius:7px;padding:11px;background:#fff;font:inherit;color:var(--deep)}
    textarea{min-height:70px;resize:vertical}.items{display:grid;gap:10px;margin-top:14px}.item{display:grid;grid-template-columns:1fr 145px 88px 38px;gap:8px;align-items:end;background:#fff9f4;border:1px solid #efd2bf;border-radius:9px;padding:11px}
    .item label{font-size:11px}.remove{width:38px;height:40px;margin:0;border:0;border-radius:7px;background:#f8ddd1;color:#8a3515;font-size:18px;cursor:pointer}.add{width:auto;margin-top:11px;border:1px dashed #c86b3d;border-radius:7px;background:#fff7f1;color:#8a3515;padding:10px 12px;font-weight:800;cursor:pointer}
    .save{width:100%;margin-top:22px;border:0;border-radius:7px;background:var(--orange);color:#fff;padding:12px;font-weight:800;font-size:14px;cursor:pointer}.hidden{display:none}.success{text-align:center;padding:25px}.success h2{margin:0 0 7px}
    @media(max-width:560px){.card{padding:18px}.item{grid-template-columns:1fr 1fr 38px}.item .product-field{grid-column:1/-1}.item .quantity-field{grid-column:1/3}.item .remove{grid-column:3}}
  </style>
</head>
<body>
  <header class="bar">LUCKIN · Stock Update</header>
  <main class="page">
    <section class="card" id="formCard">
      <h1>Update Luckin stock</h1>
      <p>Receive one box code with all products inside it.</p>
      <div class="notice">For a received box, enter the box code once. Add every product inside that box below.</div>
      <form id="form">
        <div id="receiveFields">
          <div class="field"><label for="code">Box code</label><input id="code" placeholder="Example: S01-19"></div>
          <div class="field"><label>Products inside this box</label><div class="items" id="items"></div><button class="add" type="button" id="addItem">+ Add another product</button></div>
        </div>
        <div class="field"><label for="notes">Notes</label><textarea id="notes" placeholder="Optional delivery or installation notes."></textarea></div>
        <button class="save" id="submit">Save stock update</button>
      </form>
    </section>
    <section class="card success hidden" id="success"><h2>✓ Stock updated</h2><p>The box record has been saved.</p><button class="save" onclick="location.reload()">Add another update</button></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const database=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
    const products=['吊挂','侧标','非标','背光字','灯箱','Luckin Coffee立体站式','Photo Frame','字体 1(SILVER)','字体 2(SILVER)','字体 3(SILVER)','字体 4(SILVER)','字体 5(SILVER)','字体 6(SILVER)','字体 7(SILVER)','字体 8(SILVER)','字体 9(SILVER)','PICK UP(SILVER)','NO. MY (SILVER)','字体 1(COOPER)','字体 2(COOPER)','字体 3(COOPER)','字体 4(COOPER)','字体 5(COOPER)','字体 6(COOPER)','字体 7(COOPER)','字体 8(COOPER)','字体 9(COOPER)','PICK UP(COOPER)','NO. MY (COOPER)','蓝底白鹿-正面鹿头','双面火箱古铜色','fabric lightbox','横板背架-非标Luckin Coffee'];
    const productOptions='<option value="">Select product</option>'+products.map(product=>'<option>'+product+'</option>').join('')+'<option value="__other__">Other — type a new product</option>';
    function addItem(){
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML='<div class="product-field"><label>Product name</label><select class="product">'+productOptions+'</select><input class="other-product hidden" placeholder="Type the new product name"></div><div><label>Size</label><input class="size" placeholder="Example: 600mm"></div><div class="quantity-field"><label>Qty</label><input class="quantity" type="number" min="1" value="1"></div><button type="button" class="remove" title="Remove product">×</button>';
      row.querySelector('.product').onchange=event=>row.querySelector('.other-product').classList.toggle('hidden',event.target.value!=='__other__');
      row.querySelector('.remove').onclick=()=>{if(document.querySelectorAll('.item').length>1)row.remove();};
      document.getElementById('items').appendChild(row);
    }
    function getItems(){
      return [...document.querySelectorAll('.item')].map(row=>({
        product_name:row.querySelector('.product').value==='__other__'?row.querySelector('.other-product').value.trim():row.querySelector('.product').value,
        size:row.querySelector('.size').value.trim(),
        quantity:Number(row.querySelector('.quantity').value)
      })).filter(item=>item.product_name||item.size||item.quantity!==1);
    }
    document.getElementById('addItem').onclick=addItem;
    document.getElementById('form').onsubmit=async event=>{
      event.preventDefault();
      const button=document.getElementById('submit');button.disabled=true;button.textContent='Saving...';
      let error;
      const boxCode=document.getElementById('code').value.trim();
      const notes=document.getElementById('notes').value.trim();
      const items=getItems();
      if(!boxCode||!items.length||items.some(item=>!item.product_name||!item.size||!Number.isInteger(item.quantity)||item.quantity<1)){
        alert('Enter the box code, then complete Product name, Size, and Qty for every product.');
        button.disabled=false;button.textContent='Save stock update';return;
      }
      const {data:box,error:boxError}=await database.from('luckin_boxes').insert({box_code:boxCode,product_name:items[0].product_name,size:items[0].size,notes}).select('id').single();
      error=boxError;
      if(!error)({error}=await database.from('luckin_box_items').insert(items.map(item=>({...item,box_id:box.id}))));
      if(error){alert(error.message);button.disabled=false;button.textContent='Save stock update';return;}
      document.getElementById('formCard').classList.add('hidden');document.getElementById('success').classList.remove('hidden');
    };
    addItem();
  </script>
</body>
</html>
